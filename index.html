<!DOCTYPE html>
<html>
<head>
<title>Smart Parking Finder</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<h1>Smart Parking Space Finder</h1>

<input type="text" id="name" placeholder="Your Name">

<h3>Add Parking Spot</h3>

<input type="text" id="spotName" placeholder="Spot Name">
<input type="number" id="lat" placeholder="Latitude">
<input type="number" id="lng" placeholder="Longitude">
<input type="number" id="price" placeholder="Price">

<button onclick="addSpot()">Add Spot</button>

<div id="map"></div>

<script src="script.js"></script>

</body>
</html>
